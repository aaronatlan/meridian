    .sidebar-subtitle { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .sidebar-user { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .sidebar-logout {
      font-size: 12px; color: var(--text-muted); background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 0;
    }
    .sidebar-logout:hover { color: var(--red); }

    .main-content { margin-left: 240px; flex: 1; padding: 32px 40px; min-height: 100vh; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      transition: all 0.2s;
    }
    .card-hover:hover { border-color: #2d3a4f; background: var(--bg-card-hover); }

    .btn-primary {
      background: var(--accent); color: #fff; border: none; padding: 10px 20px;
      border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
      font-family: inherit; letter-spacing: -0.01em;

    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
      padding: 9px 18px; border-radius: 8px; font-weight: 500; font-size: 13px;
      cursor: pointer; transition: all 0.15s; display: inline-flex;
      align-items: center; gap: 8px; font-family: inherit;

    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text-primary); }

    .btn-icon {
      background: transparent; color: var(--text-secondary); border: none;

    .badge-hold { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .badge-sell { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .impact-HIGH { color: var(--red); background: var(--red-bg); }
    .impact-MEDIUM { color: var(--amber); background: var(--amber-bg); }
    .impact-LOW { color: var(--green); background: var(--green-bg); }

    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .spinner-sm { width: 16px; height: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .metrics-table { width: 100%; border-collapse: collapse; }

      text-align: left; padding: 10px 16px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); border-bottom: 1px solid var(--border);

    .positive { color: var(--green); }

    .rec-card { padding: 28px 32px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-width: 1px; }

    .dot-NEGATIVE { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .dot-NEUTRAL { background: var(--text-muted); }

    .section { margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.01em; }
    .section-content { padding: 24px; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .login-bg { min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }

    .error-box { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 12px 16px; font-size: 14px; color: var(--red); margin-bottom: 16px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .radar-container { display: flex; gap: 40px; align-items: center; padding: 24px 0; }
    .radar-chart { flex-shrink: 0; }
    .radar-scores { flex: 1; }
    .score-bar { margin-bottom: 16px; }
    .score-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .score-track { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }

    .filter-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-search { flex: 1; min-width: 250px; }
    .filter-group { display: flex; gap: 8px; }

    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    @media (max-width: 768px) {
      .grid-3, .grid-2, .comparison-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .radar-container { flex-direction: column; gap: 20px; }
    }

      else if (path === '/watchlist') page = React.createElement(WatchlistPage);

      else if (path.startsWith('/memo/')) page = React.createElement(MemoPage, { memoId: path.split('/memo/')[1], key: path });
