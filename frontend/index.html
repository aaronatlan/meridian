<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian — AI Equity Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --bg-card: #0f1623;
      --bg-card-hover: #141d2e;
      --bg-input: #0a1020;
      --bg-sidebar: #060a10;
      --border: #1a2540;
      --border-light: #131c30;
      --border-focus: rgba(59,130,246,0.5);

      --text-primary: #e8eef8;
      --text-secondary: #8fa3bf;
      --text-muted: #526480;
      --text-dim: #3d4f66;

      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-dim: #1d4ed8;
      --accent-glow: rgba(59,130,246,0.15);
      --accent-glow-sm: rgba(59,130,246,0.08);

      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.08);
      --green-border: rgba(34,197,94,0.2);
      --red: #f43f5e;
      --red-bg: rgba(244,63,94,0.08);
      --red-border: rgba(244,63,94,0.2);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.08);
      --amber-border: rgba(245,158,11,0.2);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(99,102,241,0.04) 0%, transparent 60%);
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    .app-layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 232px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 20px 0;
      flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
    }
    .sidebar-brand {
      padding: 0 16px 0 20px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: #fff;
      box-shadow: 0 0 16px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }
    .sidebar-brand-text {
      font-weight: 700; font-size: 17px;
      color: var(--text-primary); letter-spacing: -0.02em;
    }
    .sidebar-subtitle {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px;
    }
    .sidebar-section-label {
      font-size: 10px; font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0 20px; margin: 8px 0 4px;
    }
    .sidebar-nav { flex: 1; padding: 0 10px; }
    .sidebar-link {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 7px;
      font-size: 13.5px; color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.15s; margin-bottom: 1px;
      border: none; background: none;
      cursor: pointer; width: 100%; font-family: inherit;
      position: relative;
    }
    .sidebar-link:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
    .sidebar-link.active {
      background: var(--accent-glow);
      color: var(--accent-hover);
    }
    .sidebar-link.active::before {
      content: '';
      position: absolute; left: -10px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 18px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .sidebar-link svg { width: 16px; height: 16px; opacity: 0.8; flex-shrink: 0; }
    .sidebar-link.active svg { opacity: 1; }
    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .sidebar-user-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .sidebar-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .sidebar-user { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .sidebar-logout {
      font-size: 12px; color: var(--text-dim);
      background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 0;
      transition: color 0.15s;
    }
    .sidebar-logout:hover { color: var(--red); }

    .main-content { margin-left: 232px; flex: 1; padding: 32px 40px; min-height: 100vh; }

    /* ── CARDS ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card-hover:hover {
      border-color: rgba(59,130,246,0.2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .card-glow {
      box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      padding: 9px 18px; border-radius: 8px;
      font-weight: 600; font-size: 13.5px; cursor: pointer;
      transition: all 0.15s; display: inline-flex;
      align-items: center; gap: 7px;
      font-family: inherit; letter-spacing: -0.01em;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px rgba(59,130,246,0.5);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(59,130,246,0.35), 0 0 0 1px rgba(96,165,250,0.5);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 8px;
      font-weight: 500; font-size: 13px;
      cursor: pointer; transition: all 0.15s; display: inline-flex;
      align-items: center; gap: 7px; font-family: inherit;
    }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text-primary); background: rgba(255,255,255,0.03); }
    .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── INPUTS ── */
    .input-field {
      width: 100%; padding: 9px 13px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-input);
      color: var(--text-primary); font-size: 13.5px; font-family: inherit;
      transition: all 0.15s; outline: none;
    }
    .input-field:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input-field::placeholder { color: var(--text-dim); }
    textarea.input-field { resize: vertical; min-height: 200px; line-height: 1.7; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 5px;
      font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em;
    }
    .badge-buy { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .badge-hold { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
    .badge-sell { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .impact-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px; letter-spacing: 0.05em;
    }
    .impact-HIGH { color: var(--red); background: var(--red-bg); }
    .impact-MEDIUM { color: var(--amber); background: var(--amber-bg); }
    .impact-LOW { color: var(--green); background: var(--green-bg); }

    /* ── SPINNER ── */
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-sm { width: 14px; height: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── METRICS TABLE ── */
    .metrics-table { width: 100%; border-collapse: collapse; }
    .metrics-table th {
      text-align: left; padding: 9px 16px;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim);
      border-bottom: 1px solid var(--border); font-weight: 600;
    }
    .metrics-table th:not(:first-child) { text-align: right; }
    .metrics-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border-light);
      font-size: 13.5px;
    }
    .metrics-table td:not(:first-child) {
      text-align: right;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    }
    .metrics-table tr:last-child td { border-bottom: none; }
    .metrics-table tr:hover { background: rgba(255,255,255,0.015); }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    /* ── CATALYST DOT ── */
    .catalyst-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
    .dot-POSITIVE { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .dot-NEGATIVE { background: var(--red); box-shadow: 0 0 8px rgba(244,63,94,0.5); }
    .dot-NEUTRAL { background: var(--text-muted); }

    /* ── SECTIONS ── */
    .section { margin-bottom: 16px; }
    .section-content { padding: 24px; }
    .section-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700;
      margin-bottom: 16px; letter-spacing: -0.01em;
      text-transform: uppercase; letter-spacing: 0.06em;
      font-size: 11px; color: var(--text-muted);
    }
    .section-header-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 50; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    /* ── LOGIN ── */
    .login-bg {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 50% -20%, rgba(59,130,246,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(99,102,241,0.06) 0%, transparent 60%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.22s ease-out; }
    @keyframes scoreIn { from { width: 0 } }

    /* ── MISC ── */
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red-border);
      border-radius: 8px; padding: 11px 15px;
      font-size: 13.5px; color: var(--red); margin-bottom: 16px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .radar-container { display: flex; gap: 40px; align-items: center; padding: 8px 0; }
    .score-bar { margin-bottom: 14px; }
    .score-label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; color: var(--text-secondary); }
    .score-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
    .score-track { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; animation: scoreIn 0.5s ease-out; }

    .filter-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-search { flex: 1; min-width: 220px; }
    .filter-group { display: flex; gap: 6px; }

    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── STAT CARDS ── */
    .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }
    .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── MEMO ROW ── */
    .memo-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; gap: 16px;
    }
    .memo-ticker-block { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
    .memo-ticker-pill {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; font-size: 13px;
      color: var(--accent-hover);
      background: var(--accent-glow-sm);
      border: 1px solid rgba(59,130,246,0.15);
      padding: 3px 9px; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
    }
    .memo-company { color: var(--text-secondary); font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .memo-meta { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .memo-confidence { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-muted); }
    .memo-date { font-size: 11.5px; color: var(--text-dim); }

    /* ── REC CARD ── */
    .rec-card-v2 {
      border-radius: 12px; padding: 24px 28px;
      margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .rec-buy-v2 {
      background: linear-gradient(135deg, rgba(34,197,94,0.1) 0%, rgba(34,197,94,0.03) 100%);
      border: 1px solid rgba(34,197,94,0.25);
    }
    .rec-hold-v2 {
      background: linear-gradient(135deg, rgba(245,158,11,0.1) 0%, rgba(245,158,11,0.03) 100%);
      border: 1px solid rgba(245,158,11,0.25);
    }
    .rec-sell-v2 {
      background: linear-gradient(135deg, rgba(244,63,94,0.1) 0%, rgba(244,63,94,0.03) 100%);
      border: 1px solid rgba(244,63,94,0.25);
    }

    /* ── FACTOR CARD ── */
    .factor-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-light);
      border-radius: 8px; padding: 14px 16px;
      margin-bottom: 10px;
    }
    .factor-card:last-child { margin-bottom: 0; }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse-live 1.5s ease-in-out infinite;
      display: inline-block; flex-shrink: 0;
    }
    .live-dot.refreshing { background: var(--amber); }

    @media (max-width: 768px) {
      .grid-3, .grid-2, .comparison-grid, .stat-strip { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px; }
      .radar-container { flex-direction: column; gap: 20px; }
    }
  </style>

    async function apiCall(path, opts = {}) {

    function RadarChart({ scores }) {
      const size = 190;
      const center = size / 2;
      const maxRadius = 65;
      const labels = ['Croissance', 'Rentabilite', 'Momentum', 'Risque', 'Qualite'];
      const values = [scores.growthScore||0, scores.profitabilityScore||0, scores.momentumScore||0, scores.riskScore||0, scores.qualityScore||0];
      const n = 5;
      const getAngle = (i) => (i * 2 * Math.PI / n) - Math.PI / 2;
      const getCoord = (angle, r) => [center + r * Math.cos(angle), center + r * Math.sin(angle)];
      const points = values.map((v, i) => getCoord(getAngle(i), (v / 100) * maxRadius));
      const polygonPath = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(2) + ',' + p[1].toFixed(2)).join(' ') + 'Z';
      const gridLines = [25, 50, 75, 100].map((level, idx) => {
        const r = (level / 100) * maxRadius;
        const pts = Array.from({ length: n }).map((_, i) => getCoord(getAngle(i), r));
        const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(2) + ',' + p[1].toFixed(2)).join(' ') + 'Z';
        return React.createElement('path', { key: idx, d, fill: 'none', stroke: '#1a2540', strokeWidth: level === 100 ? 1 : 0.5 });
      });
      const axisLines = Array.from({ length: n }).map((_, i) => {
        const angle = getAngle(i);
        const p2 = getCoord(angle, maxRadius);
        return React.createElement('line', { key: i, x1: center, y1: center, x2: p2[0].toFixed(2), y2: p2[1].toFixed(2), stroke: '#1a2540', strokeWidth: 0.5 });
      });
      const pointDots = points.map((p, i) => React.createElement('circle', { key: i, cx: p[0].toFixed(2), cy: p[1].toFixed(2), r: 2.5, fill: '#3b82f6', stroke: '#0f1623', strokeWidth: 1.5 }));
      const labelElems = Array.from({ length: n }).map((_, i) => {
        const angle = getAngle(i);
        const p = getCoord(angle, maxRadius + 18);
        return React.createElement('text', { key: i, x: p[0].toFixed(2), y: p[1].toFixed(2), textAnchor: 'middle', dy: '0.3em', fill: '#526480', fontSize: 9, fontFamily: 'Inter, sans-serif', fontWeight: 500 }, labels[i]);
      });
      return React.createElement('svg', { viewBox: `0 0 ${size} ${size}`, width: 190, height: 190, style: { display: 'block' } },
        ...gridLines, ...axisLines,
        React.createElement('path', { d: polygonPath, fill: 'rgba(59,130,246,0.12)', stroke: '#3b82f6', strokeWidth: 1.5 }),
        ...pointDots, ...labelElems
      );
    }

        ) : React.createElement('div', { className: 'card', style: { padding: 56, textAlign: 'center' } },
          React.createElement('p', { style: { color: 'var(--text-muted)', fontSize: 13.5 } }, 'Sélectionnez deux memos pour commencer la comparaison.')
        )
      );
    }

    function App() {
      const { user, loading } = useAuth();
      const { path } = useRouter();
      if (loading) return React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: 'var(--bg)' } }, React.createElement('div', { className: 'spinner' }));
      if (!user) return React.createElement(LoginPage);
      let page;
      if (path === '/' || path === '') page = React.createElement(DashboardPage);
      else if (path === '/analyze') page = React.createElement(AnalyzePage);
      else if (path === '/watchlist') page = React.createElement(WatchlistPage);
      else if (path === '/compare') page = React.createElement(ComparePage);
      else if (path === '/trading') page = React.createElement(TradingDeskPage);
      else if (path.startsWith('/memo/')) page = React.createElement(MemoPage, { memoId: path.split('/memo/')[1], key: path });
      else page = React.createElement(DashboardPage);
      return React.createElement('div', { className: 'app-layout' },
        React.createElement(Sidebar),
        React.createElement('main', { className: 'main-content' }, page)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(AuthProvider, null, React.createElement(App))
    );
  </script>
</head>

  <div id="root"></div>
